{% extends 'base.html' %}
{% block title %}Mettre à jour l'avancement{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h1 class="h5 mb-0">Avancement du syllabus — {{ course.title }}</h1>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success">Enregistrer</button>
                    <a href="{% url 'course_detail' course.pk %}" class="btn btn-outline-secondary">Retour</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
